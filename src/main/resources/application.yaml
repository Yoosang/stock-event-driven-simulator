spring:
  datasource:
    url: jdbc:h2:mem:testdb  # 로컬 테스트용 메모리 DB
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update      # 중요! Entity 클래스를 보고 테이블을 자동 생성/수정해줌
    show-sql: true          # 실행되는 SQL을 콘솔에 출력 (디버깅용)
    properties:
      hibernate:
        format_sql: true    # SQL을 예쁘게 정렬해서 출력

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092