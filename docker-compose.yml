version: '3.8'

services:
  # 1. MySQL: 영구 데이터 저장소 (JPA 연동)
  db:
    image: mysql:8.0
    container_name: stock-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: stock_db
      MYSQL_ROOT_PASSWORD: password
    networks:
      - stock-network

  # 2. Redis: 실시간 시세 캐싱
  redis:
    image: redis:latest
    container_name: stock-redis
    ports:
      - "6379:6379"
    networks:
      - stock-network

  # 3. Zookeeper & Kafka: 메시지 큐
  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: stock-zookeeper
    ports:
      - "2181:2181"
    networks:
      - stock-network

  kafka:
    image: wurstmeister/kafka:latest
    container_name: stock-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: 127.0.0.1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "stock-prices:1:1, order-events:1:1"
    depends_on:
      - zookeeper
    networks:
      - stock-network

networks:
  stock-network:
    driver: bridge
